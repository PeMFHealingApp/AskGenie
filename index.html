function searchP(q){
  return fetch(PEMF_API+encodeURIComponent(q)).then(function(r){
    if(!r.ok)throw new Error();
    return r.json();
  }).then(function(d){
    if(!Array.isArray(d)||!d.length)return[];
    return d.slice(0,2).map(function(p){return{t:p["Program Title"]||"Unknown",u:p["Full URL"]||""}});
  }).catch(function(){return[]});
}

function gT(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,"").split(/\s+/).filter(function(x){return x.length>2&&!ST.has(x)}).join(" ")}
function gH(m){return gT(m.filter(function(x){return x.role==="user"}).map(function(x){return x.text||""}).join(" ")).split(" ").slice(0,4).join(" ")}
function iS(t){var l=t.trim().toLowerCase();return l.length<=2||/^\d+$/.test(l)||["yes","no","ok","sure","thanks","hello","hi","hey","good","great"].indexOf(l)>=0}

function toB(f){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result.split(",")[1])};
    r.onerror=rej;
    r.readAsDataURL(f);
  });
}

function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}

function fmt(t){
  var h=t;
  h=h.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
  h=h.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" style="color:#C49C25">$1</a>');
  h=h.replace(/Open Program[:\s]*(https?:\/\/[^\s<]+)/gi,'<a href="$1" target="_blank" style="color:#C49C25">Open Program</a>');
  h=h.replace(/(https?:\/\/[^\s<\)]+)/g,function(m,u,o,s){
    var b=s.substring(Math.max(0,o-10),o);
    if(b.indexOf("href=")>=0||b.indexOf('"')>=0)return m;
    return '<a href="'+u+'" target="_blank" style="color:#C49C25">Open Program</a>';
  });
  h=h.replace(/\n/g,"<br>");
  return h;
}

    if(mem.device)sysText+="\nDevice: "+mem.device;

    var contents=[];
    for(var i=0;i<msgs.length;i++){
      var m=msgs[i];
      if(m.role==="user"){
        var txt=m.text+(i===msgs.length-1?pc:"");
        contents.push({role:"user",parts:[{text:txt}]});
      }else{
        contents.push({role:"model",parts:[{text:m.text}]});
      }
    }

    var body={
      contents:contents,
      systemInstruction:{parts:[{text:sysText}]},
      generationConfig:{maxOutputTokens:4096}
    };

    if(cf){
      toB(cf).then(function(b64){

        return callAPI(body);
      }).catch(handleErr);
    }else{
      callAPI(body);
    }
  };

  if(topic.length>2){
    var allResults=[];
    Promise.all(extraTerms.map(function(t){return searchP(t)})).then(function(results){var main=[];var seen={};results.forEach(function(r){r.forEach(function(p){if(!seen[p.u]){seen[p.u]=1;main.push(p)}})});
      allResults.push({cat:"MAIN",r:main});
      var catPromises=CATS.map(function(cat){return searchP(topic+" "+cat).then(function(r){if(r.length)allResults.push({cat:cat.toUpperCase(),r:r})})});
      return Promise.all(catPromises);
    }).then(function(){
      var pc="";
      if(allResults.some(function(x){return x.r.length})){
        pc="\n\n[PROGRAM DATA ALREADY FETCHED - USE IMMEDIATELY]\n";
        allResults.forEach(function(x){if(x.r.length)pc+=x.cat+":\n"+x.r.map(function(p){return "- "+p.t+" | Full URL: "+p.u}).join("\n")+"\n"});
      }
      doSend(pc);
    }).catch(function(){doSend("")});
  }else{
    doSend("");
  }
}

function callAPI(body){
  console.log("[LUMA] Calling Gemini API, parts:",body.contents.length);
  fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(res){
    return res.json();
  }).then(function(data){
    console.log("[LUMA] API response:",JSON.stringify(data).slice(0,500));
    var reply="A momentary pause in the field. Please try again.";
    try{reply=data.candidates[0].content.parts[0].text}catch(e){console.error("[LUMA] Parse error:",e)}
    msgs.push({role:"assistant",text:reply});
    var ut=msgs.filter(function(x){return x.role==="user"}).map(function(x){return x.text||""}).join(" ").toLowerCase();
    var nm=ut.match(/(?:my name is|i'm|i am) ([a-z]+)/i);
    var mem=getM();
    if(nm){mem.name=nm[1].charAt(0).toUpperCase()+nm[1].slice(1);saveM(mem)}
    var devs=["headphones","pemf coil","haptic mat","pemf mat","scalar","plasma","itorus","imprinter"];
    for(var d=0;d<devs.length;d++){if(ut.indexOf(devs[d])>=0){mem.device=devs[d];saveM(mem);break}}
    incDailyCount();
    saveCur();
    ld=false;render();
    setTimeout(function(){var e=document.getElementById("ce");if(e)e.scrollIntoView({behavior:"smooth"});var t=document.getElementById("ti");if(t){t.value="";t.focus()}},50);
  }).catch(handleErr);
}

var currentAudio=null;
var speaking=false;
var ttsCancel=false;

function speak(text){
  if(speaking){stopSpeak();return}
  var clean=text.replace(/\*\*/g,"").replace(/\[([^\]]+)\]\([^)]+\)/g,"$1").replace(/https?:\/\/[^\s]+/g,"").replace(/<[^>]+>/g,"").replace(/[#*_~`>\-]/g,"").replace(/\n+/g,". ").trim();
  if(!clean)return;
  if(clean.length>200)clean=clean.substring(0,200);
  speaking=true;
  ttsCancel=false;
  var b=document.getElementById("spkb");
  if(b){b.style.background="#C49C25";b.style.color="#0A0A08";b.style.animation="pulse 1s infinite";}
  console.log("[LUMA] Fetching TTS, text length:",clean.length);
  Promise.race([
    fetch(API_URL+"/tts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({input:clean,voice:"nova",model:"tts-1",response_format:"mp3",speed:1.1})}),
    new Promise(function(_,rej){setTimeout(function(){rej(new Error("TTS timeout"))},30000)})
  ])
  .then(function(r){
    console.log("[LUMA] TTS status:",r.status);
    if(!r.ok)throw new Error("TTS "+r.status);
    return r.blob();
  })
  .then(function(blob){
    console.log("[LUMA] Audio blob size:",blob.size);
    if(blob.size<100)throw new Error("Empty audio");
    var url=URL.createObjectURL(blob);
    if(ttsCancel){URL.revokeObjectURL(url);stopSpeak();return}
    var audio=new Audio(url);
    currentAudio=audio;
    audio.onended=function(){URL.revokeObjectURL(url);stopSpeak()};
    audio.onerror=function(){URL.revokeObjectURL(url);stopSpeak()};
    audio.play().then(function(){
      console.log("[LUMA] Audio playing");var b=document.getElementById("spkb");if(b)b.style.animation="none";
    }).catch(function(e){
      console.error("[LUMA] Play failed:",e);
      stopSpeak();
    });
  })
  .catch(function(e){console.error("[LUMA] TTS fetch error:",e);stopSpeak()});
}

function stopSpeak(){
  speaking=false;
  ttsCancel=true;
  if(currentAudio){try{currentAudio.pause();currentAudio.src="";currentAudio=null}catch(e){currentAudio=null}}
  var b=document.getElementById("spkb");
  if(b){b.style.background="rgba(106,106,94,.15)";b.style.color="#6a6a5e";b.style.animation="none"}
}

function toggleSpeak(){
  if(speaking){stopSpeak();return}
  var last=null;
  for(var i=msgs.length-1;i>=0;i--){if(msgs[i].role==="assistant"){last=msgs[i].text;break}}
  if(last)speak(last);
}

      '\')" style="background:#111110;border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:14px 12px;color:#C8C8B8;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;text-align:left;line-height:1.5;min-height:52px;display:flex;align-items:center">'+esc(p)+'</button>';

    }else{
      h+='<div style="display:flex;align-items:flex-start;animation:fadeIn .3s ease">'+tor("sm")+'<div style="max-width:85%;padding:12px 16px;border-radius:8px;font-size:14px;line-height:1.75;background:#111110;border:1px solid rgba(255,255,255,.05);margin-left:8px">'+fmt(m.text)+'</div></div>';
    }
  }

  if(ld){
    h+='<div style="display:flex;align-items:flex-start;animation:fadeIn .2s ease">'+tor("sm")+'<div style="padding:12px 16px;border-radius:8px;background:#111110;border:1px solid rgba(255,255,255,.05);margin-left:8px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#C49C25;animation:pulse 1.2s infinite"></span> <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#C49C25;animation:pulse 1.2s .2s infinite"></span> <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#C49C25;animation:pulse 1.2s .4s infinite"></span><span style="font-size:11px;color:#6a6a5e;margin-left:8px">Decoding resonance...</span></div></div>';
  }

  h+='<div id="ce"></div></div>';
  h+='<button id="stb" onclick="scrollBot()" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;background:rgba(196,156,37,.25);color:#C49C25;border:1px solid rgba(196,156,37,.3);cursor:pointer;z-index:15;align-items:center;justify-content:center;backdrop-filter:blur(4px)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 12 12 19 19 12"/></svg></button>';

  if(attP){
    h+='<div style="padding:8px 16px 0;background:rgba(17,17,16,.8);border-top:1px solid rgba(255,255,255,.03);display:flex;align-items:center;gap:8px"><div style="position:relative"><img src="'+attP+'" style="height:48px;border-radius:6px;border:1px solid rgba(255,255,255,.06)"><button onclick="rmFile()" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:rgba(248,113,113,.6);border:none;color:#0A0A08;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center">x</button></div><span style="font-size:11px;color:#6a6a5e">Image attached</span></div>';
  }

  var ti=document.getElementById("ti");var can=((inp&&inp.trim())||(ti&&ti.value&&ti.value.trim())||attF)&&!ld;
  h+='<div style="padding:14px 16px calc(26px + env(safe-area-inset-bottom, 0px));border-top:1px solid rgba(255,255,255,.05);background:#111110;flex-shrink:0"><input type="file" id="fi" accept="image/*" style="display:none" onchange="pickFile(event)"><div style="display:flex;align-items:flex-end;background:#0A0A08;border-radius:24px;border:1px solid rgba(255,255,255,.05);padding:6px 8px">'+
  '<button onclick="document.getElementById(\'fi\').click()" style="width:44px;height:44px;border-radius:50%;border:none;background:transparent;color:#9a9a8a;cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>'+
  '<textarea id="ti" rows="1" placeholder="Ask Luma anything..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();send()}" oninput="inp=this.value;updSb()" style="flex:1;background:transparent;border:none;outline:none;color:#F0EBE0;font-size:16px;resize:none;font-family:inherit;line-height:1.5;padding:10px 4px;max-height:80px">'+esc(inp)+'</textarea>'+
  
  '<button id="spkb" onclick="toggleSpeak()" style="width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(106,106,94,.15);color:#6a6a5e;transition:all .2s"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>'+
  '<div style="width:6px"></div>'+
  '<button id="sb" onclick="send()" '+(can?"":"disabled")+' style="width:44px;height:44px;border-radius:50%;border:none;cursor:'+(can?"pointer":"default")+';background:'+(can?"#C49C25":"rgba(106,106,94,.15)")+';color:'+(can?"#0A0A08":"#6a6a5e")+';display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>'+
  '</div></div>';

  el.innerHTML=h;
}

render();
setTimeout(function(){var s=document.getElementById("splash");if(s)s.remove()},2500);

// Header shrink on scroll + scroll-to-bottom button
setInterval(function(){
  var ca=document.getElementById("ca");
  var hdr=document.getElementById("hdr");
  if(ca&&hdr){
    if(ca.scrollTop>40){
      hdr.style.padding="6px 16px";
      var sub=document.getElementById("hsub");
      if(sub)sub.style.display="none";
      var logo=document.getElementById("hlogo");
      if(logo)logo.style.display="none";
      var title=document.getElementById("htitle");
      if(title)title.style.fontSize="13px";
    }else{
      hdr.style.padding="12px 16px";
      var sub=document.getElementById("hsub");
      if(sub)sub.style.display="block";
      var logo=document.getElementById("hlogo");
      if(logo)logo.style.display="flex";
      var title=document.getElementById("htitle");
      if(title)title.style.fontSize="16px";
    }
  }
},200);
// Scroll-to-bottom button visibility
setInterval(function(){
  var ca=document.getElementById("ca");
  var stb=document.getElementById("stb");
  if(ca&&stb){
    var atBottom=ca.scrollHeight-ca.scrollTop-ca.clientHeight<100;
    stb.style.display=atBottom?"none":"flex";
  }
},500);

// Register Service Worker for PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
